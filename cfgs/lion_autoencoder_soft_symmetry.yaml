exp_name: "lion-ae-train-soft-symmetry"
seed: 10
device: "auto"

data:
  root_dir: "data/ShapeNetCore"
  max_models: 400
  augment: false
  val_frac: 0.1
  test_frac: 0.1
  categories: ["02691156"]

autoencoder:
  type: "lion"
  epochs: 35
  global_latent_dim: 96
  local_latent_dim: 8
  hidden_dim: 96
  resolution: 24
  enc_blocks: 2
  local_enc_blocks: 1
  dec_blocks: 2
  skip_weight: 0.01
  pts_sigma_offset: 2.0
  log_sigma_clip: [-10.0, 2.0]
  recon_loss: "chamfer"

  lambda_z: 1.0
  lambda_h: 1.0
  lambda_h_xyz: 1.0
  lambda_h_feat: 1.0

  kl_normalize: "sum"
  kl_free_bits: 0.25

  kl_anneal:
    enabled: true
    min_coeff: 1.0e-6
    max_coeff: 1.0e-2
    portion: 0.3
    const_portion: 0.0

  symmetry:
    axis: 0
    metric: "chamfer"
    hard:
      enabled: false
    soft:
      recon_weight: 0.05
      latent_weight: 0.02
    log:
      use_reflection_metric: true
      reflection_max_points: 128

train:
  batch_size: 6
  num_points: 512
  num_workers: 2
  out_dir: "runs"
  amp: true
  amp_forward: true
  loss_fp32: false
  raise_on_nonfinite_loss: false
  skip_nonfinite_batches: true
  grad_accum_steps: 2
  lr: 2.0e-4

lr_scheduler:
  name: "cosine_warmup"
  warmup_epochs: 5
  min_lr: 1.0e-6
