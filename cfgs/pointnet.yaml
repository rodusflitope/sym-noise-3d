exp_name: "pointnet-baseline"
seed: 10
device: "auto"

data:
  root_dir: "data/ShapeNetCore"
  max_models: 200

model:
  name: "pointnet_eps"
  hidden_dim: 256
  time_dim: 128

loss:
  name: "min_snr"
  gamma: 5.0

train:
  batch_size: 64
  epochs: 100
  lr: 0.0002
  log_every: 50
  num_points: 2048
  num_workers: 8
  out_dir: "runs"

diffusion:
  T: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "cosine"
  noise_type: "gaussian"

sampler:
  name: "ddpm"
  eta: 1.0
  num_samples: 4
  save_dir: "samples"
  save_format: "npy"
