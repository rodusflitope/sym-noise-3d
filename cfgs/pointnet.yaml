exp_name: "pointnet-baseline"
seed: 10
device: "auto"

data:
  root_dir: "data/ShapeNetCore"
  max_models: 2000
  val_frac: 0.1
  test_frac: 0.1

model:
  name: "pointnet_eps"
  hidden_dim: 256
  time_dim: 128

loss:
  name: "mse"
  weighting: "none"

train:
  batch_size: 64
  epochs: 200
  log_every: 50
  num_points: 2048
  num_workers: 8
  out_dir: "runs"

lr_scheduler:
  name: "cosine_warmup"
  base_lr: 0.0005
  warmup_steps: 200
  min_lr: 0.00002

diffusion:
  T: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "cosine"
  noise_type: "gaussian"

sampler:
  name: "ddpm"
  eta: 1.0
  num_samples: 4
  save_dir: "samples"
  save_format: "npy"
