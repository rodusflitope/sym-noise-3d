exp_name: "pointtransformer-symmetric-reflected"
seed: 10
device: "auto"

data:
  root_dir: "data/ShapeNetCore"
  max_models: 2000
  augment: false
  val_frac: 0.1
  test_frac: 0.1
  enforce_symmetry: false
  sample_symmetric: true
  symmetry_axis: 0

model:
  name: "pointtransformer_eps"
  hidden_dim: 128
  time_dim: 128
  num_heads: 4
  num_layers: 3

loss:
  name: "snr_weighted"

train:
  batch_size: 64
  epochs: 100
  log_every: 50
  num_points: 2048
  num_workers: 8
  out_dir: "runs"
  save_every: 10

diffusion:
  T: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "linear"
  noise_type: "symmetric"
  symmetric:
    base_type: "gaussian"
    mode: "reflected"
    axis: 0
    active_dims: [0, 1, 2]

sampler:
  name: "ddpm"
  eta: 1.0
  num_samples: 4
  save_dir: "samples"
  save_format: "npy"

lr_scheduler:
  name: "cosine_warmup"
  base_lr: 1.0e-4
  min_lr: 1.0e-6
  warmup_steps: 500