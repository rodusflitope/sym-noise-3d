exp_name: "debug-baseline"
seed: 10
device: "auto"

model:
  name: "epsilon_mlp"
  hidden_dim: 128
  time_dim: 64

train:
  batch_size: 8
  epochs: 2
  lr: 0.001
  log_every: 50
  num_points: 2048
  steps_per_epoch: 200
  out_dir: "runs"

diffusion:
  T: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "linear"

sampler:
  name: "ddpm"
  eta: 1.0
  num_samples: 4
  save_dir: "samples"
  save_format: "npy"
