# Generic configuration template
# Keep this file as a reference. Set unused options to null.

exp_name: "my-experiment"
seed: 10
device: "auto"  # "auto", "cpu", "cuda", "cuda:0"
use_latent_diffusion: false

data:
  root_dir: "data/ShapeNetCore"
  max_models: null
  val_frac: 0.1
  test_frac: 0.1
  categories: null  # null or ["02691156", "03001627"]
  augment: false
  rotate_prob: 0.5
  flip_prob: 0.5
  jitter_sigma: 0.01
  enforce_symmetry: false
  symmetry_axis: 0
  sample_symmetric: false
  use_symmetry_plane_labels: false
  symmetry_plane_cache_path: null
  symmetry_plane_cache_required: false

model:
  # epsilon_mlp | pointnet_eps | pointtransformer_eps | latent_eps | lion_priors |
  # pvcnn | pvcnn_sym_learned_plane | pt_sym_learned_plane |
  # pvcnn_conditional_sym_plane | pt_conditional_sym_plane | pvcnn_true_joint |
  # legacy_pvcnn
  name: "pointnet_eps"
  hidden_dim: 128
  time_dim: 64
  input_dim: 3

  # Transformer / PT models
  num_heads: null
  num_layers: null
  use_fourier_features: null
  use_symmetric_attention: null

  # PVCNN / True-joint models
  plane_hidden_dim: null
  resolution: null
  num_blocks: null
  early_fusion_type: null  # "add" | "concat"

  # Latent models
  latent_dim: null
  hidden_dim_z: null
  hidden_dim_h: null
  num_blocks_z: null
  num_blocks_h: null
  dropout: null

  # Legacy PVCNN options
  embed_dim: null
  use_att: null
  extra_feature_channels: null
  width_multiplier: null
  voxel_resolution_multiplier: null
  sa_blocks: null
  fp_blocks: null

# Optional for conditional joint models (pvcnn_conditional_sym_plane / pt_conditional_sym_plane)
# conditional_symmetry:
#   geometry_mode: "half"           # "half" | "full"
#   plane_mode: "diffusion"         # "diffusion" | "conditioning"
#   fixed_plane_axis: null           # null | 0 | 1 | 2 | "x" | "y" | "z"
#   selection_method: "hard"        # "hard" | "soft"
#   soft_mask_temperature: 10.0
#   soft_mask_use_ste: false
#   train_selection_mode: "curriculum"        # "curriculum" | "gt" | "plane_t" | "predicted"
#   train_selection_reference_mode: "x0"      # "x0" | "running_x0"

# Optional for true-joint models (pvcnn_true_joint)
# joint_symmetry:
#   geometry_mode: "half"           # "half" | "full"
#   plane_mode: "diffusion"         # should stay "diffusion" for true-joint
#   fixed_plane_axis: null
#   early_fusion_type: "add"        # "add" | "concat"

autoencoder:
  # point_mlp | lion | lion_pvcnn
  type: "point_mlp"
  latent_dim: 256
  hidden_dim: 128
  epochs: 100
  global_latent_dim: null
  local_latent_dim: null
  resolution: null
  enc_blocks: null
  local_enc_blocks: null
  dec_blocks: null
  log_sigma_clip: null   # [min, max] or {min: -10.0, max: 2.0}
  skip_weight: null
  pts_sigma_offset: null
  recon_loss: null       # "chamfer" | "emd" | "l1"
  emd_max_points: null
  kl_weight_global: null
  kl_weight_local: null
  lambda_z: null
  lambda_h: null
  lambda_h_xyz: null
  lambda_h_feat: null
  kl_normalize: null
  kl_free_bits: null
  kl_anneal: null
  symmetry:
    axis: 0
    metric: "chamfer"
    hard:
      enabled: false
    soft:
      recon_weight: 0.0
      latent_weight: 0.0
    log:
      use_reflection_metric: true
      reflection_max_points: 256

loss:
  name: "mse"                 # "mse" | "huber"
  weighting: "none"           # "none" | "snr" | "min_snr" | "p2" | "truncated_snr"
  delta: 1.0
  gamma: 5.0
  k: 1.0
  min_snr: 0.1
  max_snr: 10.0

  # Sym-plane / joint / true-joint losses
  lambda_sym: null
  lambda_diff: null
  lambda_plane: null
  lambda_recon: null
  lambda_plane_consistency: null
  plane_normal_weight: null
  plane_offset_weight: null
  metric: null                 # "cd" | "emd"
  warmup_steps: 1000
  selection_warmup_steps: null
  selection_gt_prob_start: null
  selection_gt_prob_end: null

train:
  batch_size: 32
  epochs: 100
  log_every: 50
  num_points: 2048
  num_workers: 0
  out_dir: "runs"
  save_every: 10
  amp: false
  lr: null
  weight_decay: null

diffusion:
  T: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "linear"          # "linear" | "cosine" | "quadratic" | "sigmoid" | "sqrt" | "scaled_linear"
  noise_type: "gaussian"      # "gaussian" | "uniform" | "spherical" | "laplacian" | "student_t"
  df: null                     # only for student_t

  # Optional structural symmetric noise wrapper
  # symmetric:
  #   base_type: "gaussian"
  #   mode: "reflected"       # "masked" | "reflected" | "average"
  #   axis: 0
  #   active_dims: [0, 1, 2]

sampler:
  name: "ddpm"                # "ddpm" | "ddim" | "true_joint"
  eta: 1.0
  num_samples: 4
  save_dir: "samples"
  save_format: "npy"          # "npy" | "ply"
  sampling_steps: null         # null -> use diffusion.T
  num_steps: null              # alias of sampling_steps
  normalize_output: false
  normalizer: null             # e.g. "center_and_scale"

  # Joint sampler options
  conditional_selection_mode: null  # "predicted" | "plane_t" | "plane_x0_pred"
  joint_selection_mode: null
  selection_reference_mode: null    # "running_x0" | "x_t"

lr_scheduler:
  name: "cosine_warmup"       # "cosine_warmup" | "none"
  base_lr: 2.0e-4
  min_lr: 1.0e-6
  warmup_steps: 500
  warmup_epochs: null
  weight_decay: 0.01

# Optional
# ema:
#   use: false
#   decay: 0.999
#   beta: null
#   warmup_steps: 0
#   warmup_init: 0.0

# Optional
# debug:
#   joint_plane_monitor:
#     enabled: false
#     source: "val"            # "val" | "train"
#     batch_size: 4
#     timesteps: ["low", "mid", "high"]
#     metric: "cd"
#     print_every: 1
