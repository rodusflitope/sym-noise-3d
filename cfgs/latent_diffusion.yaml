exp_name: "latent-diffusion"
seed: 10
device: "auto"

use_latent_diffusion: true

data:
  root_dir: "data/ShapeNetCore"
  max_models: 2000
  augment: true
  rotate_prob: 0.5
  flip_prob: 0.5
  jitter_sigma: 0.02
  val_frac: 0.1
  test_frac: 0.1
  categories: null

model:
  name: "latent_eps"
  latent_dim: 256
  hidden_dim: 512
  time_dim: 64

autoencoder:
  hidden_dim: 128
  latent_dim: 256
  epochs: 100

latent_diffusion:
  use: true
  latent_dim: 256
  hidden_dim: 512
  time_dim: 64

loss:
  name: "mse"
  weighting: "snr"

train:
  batch_size: 32
  epochs: 100
  log_every: 50
  num_points: 2048
  num_workers: 8
  out_dir: "runs"

diffusion:
  T: 400
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "scaled_linear"
  noise_type: "gaussian"

sampler:
  name: "ddpm"
  eta: 1.0
  num_samples: 4
  save_dir: "samples"
  save_format: "npy"

ema:
  use: false
  beta: 0.999

lr_scheduler:
  name: "cosine_warmup"
  warmup_steps: 1000
  base_lr: 0.001
  min_lr: 0.00001
